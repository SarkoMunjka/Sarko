<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Forest Whisper — Tree Houses &amp; Forest Retreats</title>
<meta name="description" content="Try a new level of relaxation in tree houses. Where comfort meets the magic of nature." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Pinyon+Script&display=swap" rel="stylesheet" />
<style>
  :root {
    --white: #ffffff;
    --ink: #1c1c1c;
    --olive: rgba(52, 58, 44, 0.82);
    --olive-solid: #3a4234;
    --gold-1: #d4c4a8;
    --gold-2: #ebe2d0;
    --gold-3: #c8b896;
    --ease: cubic-bezier(.22,.61,.36,1);
    --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --font-serif: "Cormorant Garamond", Georgia, "Times New Roman", serif;
    --font-script: "Pinyon Script", cursive;
    --pad-x: clamp(20px, 4vw, 56px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
  body { font-family: var(--font-sans); color: var(--ink); background: #fff; overflow-x: hidden; }

  /* ===== HERO SHELL ===== */
  .hero {
    position: relative;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    color: var(--white);
  }

  .hero__bg {
    position: absolute;
    inset: 0;
    background: #1a2218 url("img/hero-bg.png") 72% 42% / cover no-repeat;
    transform: scale(1.04);
    animation: hero-zoom 18s var(--ease) forwards;
  }
  @keyframes hero-zoom {
    to { transform: scale(1); }
  }

  .hero__scrim {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, rgba(10,14,8,.42) 0%, rgba(10,14,8,.18) 38%, rgba(10,14,8,.55) 78%, rgba(10,14,8,.72) 100%),
      linear-gradient(90deg, rgba(8,12,6,.55) 0%, rgba(8,12,6,.2) 45%, rgba(8,12,6,.35) 100%);
  }

  .hero__leaves {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(120% 80% at 8% 95%, rgba(18,32,14,.92) 0%, transparent 52%),
      radial-gradient(90% 70% at 92% 88%, rgba(14,26,12,.75) 0%, transparent 48%),
      radial-gradient(60% 40% at 15% 70%, rgba(22,38,18,.45) 0%, transparent 70%);
    filter: blur(2px);
  }

  /* ===== NAV ===== */
  .nav {
    position: relative;
    z-index: 20;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 16px;
    padding: 28px var(--pad-x) 0;
  }

  .nav__logo {
    display: inline-flex;
    align-items: baseline;
    gap: 6px;
    text-decoration: none;
    color: var(--white);
    justify-self: start;
    opacity: 0;
    animation: rise-in 1s var(--ease) .15s forwards;
  }
  .nav__logo-script {
    font-family: var(--font-script);
    font-size: clamp(2.1rem, 3.8vw, 2.9rem);
    font-weight: 400;
    line-height: 1;
    letter-spacing: 0.01em;
  }
  .nav__logo-caps {
    font-family: var(--font-sans);
    font-size: clamp(0.62rem, 1.1vw, 0.78rem);
    font-weight: 400;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    opacity: 0.95;
    transform: translateY(-2px);
  }

  .nav__menu {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0;
    list-style: none;
    opacity: 0;
    animation: rise-in 1s var(--ease) .28s forwards;
  }

  .nav__menu li { display: flex; align-items: center; }
  .nav__menu li + li::before {
    content: "";
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(255,255,255,.55);
    margin: 0 14px;
    flex-shrink: 0;
  }

  .nav__menu a {
    color: rgba(255,255,255,.92);
    text-decoration: none;
    font-size: 12.5px;
    font-weight: 400;
    letter-spacing: 0.04em;
    text-transform: lowercase;
    transition: opacity .2s;
    white-space: nowrap;
  }
  .nav__menu a:hover { opacity: .7; }

  .nav__right {
    justify-self: end;
    display: flex;
    align-items: center;
    gap: 18px;
    opacity: 0;
    animation: rise-in 1s var(--ease) .4s forwards;
  }

  .nav__phone {
    color: rgba(255,255,255,.92);
    text-decoration: none;
    font-size: 12.5px;
    letter-spacing: 0.03em;
    white-space: nowrap;
    transition: opacity .2s;
  }
  .nav__phone:hover { opacity: .75; }

  .nav__socials { display: flex; gap: 10px; }
  .nav__social {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,.55);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--white);
    text-decoration: none;
    transition: background .25s, border-color .25s, transform .25s var(--ease);
  }
  .nav__social:hover {
    background: rgba(255,255,255,.12);
    border-color: rgba(255,255,255,.85);
    transform: translateY(-1px);
  }
  .nav__social svg { width: 15px; height: 15px; }

  .nav__burger {
    display: none;
    width: 40px;
    height: 40px;
    border: 1px solid rgba(255,255,255,.45);
    border-radius: 50%;
    background: transparent;
    color: #fff;
    cursor: pointer;
    align-items: center;
    justify-content: center;
  }

  /* ===== HERO BODY ===== */
  .hero__body {
    position: relative;
    z-index: 10;
    flex: 1;
    display: flex;
    align-items: flex-end;
    padding: clamp(32px, 5vh, 64px) var(--pad-x) clamp(100px, 12vh, 150px);
  }

  .hero__content {
    width: 100%;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    gap: clamp(18px, 2.8vw, 36px);
    max-width: min(900px, 70vw);
  }

  /* Torn-edge promo card */
  .hero__card {
    position: relative;
    flex: 0 0 clamp(200px, 22vw, 268px);
    padding: 34px 28px 30px;
    color: var(--white);
    opacity: 0;
    filter: blur(8px);
    transform: translateY(24px);
    animation: focus-in 1.2s var(--ease) .5s forwards;
    background: rgba(42, 50, 36, 0.72);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    clip-path: url(#card-torn-clip);
    margin-bottom: clamp(8px, 1.5vh, 20px);
  }

  .hero__leaf {
    width: 42px;
    height: 42px;
    margin-bottom: 22px;
    opacity: .9;
  }

  .hero__card p {
    font-size: 15px;
    line-height: 1.55;
    color: rgba(255,255,255,.88);
    margin-bottom: 28px;
    max-width: 220px;
  }

  .hero__cta {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 13px 30px;
    border: none;
    border-radius: 999px;
    background: linear-gradient(180deg, #ebe2d0 0%, #d8c9ad 42%, #c4b08e 100%);
    color: #2a2618;
    font: 500 11px var(--font-serif);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(0,0,0,.2);
    transition: transform .25s var(--ease), box-shadow .3s var(--ease);
  }
  .hero__cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 32px rgba(0,0,0,.28);
  }

  .hero__title {
    font-family: var(--font-serif);
    font-weight: 300;
    font-size: clamp(2.35rem, 5.4vw, 4.85rem);
    line-height: 0.94;
    letter-spacing: 0.055em;
    text-transform: uppercase;
    color: var(--white);
    text-shadow: 0 2px 32px rgba(0,0,0,.4);
    opacity: 0;
    filter: blur(10px);
    transform: translateY(28px);
    animation: focus-in 1.35s var(--ease) .65s forwards;
    margin-bottom: clamp(4px, 1vh, 12px);
  }
  .hero__title .line {
    display: block;
  }
  .hero__title .line--indent {
    padding-left: 0.55em;
  }

  /* Torn paper bottom edge */
  .hero__torn {
    position: absolute;
    left: 0;
    right: 0;
    bottom: -2px;
    z-index: 15;
    height: clamp(56px, 8.5vw, 110px);
    pointer-events: none;
    line-height: 0;
  }
  .hero__torn svg {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* Placeholder — cream section below torn edge */
  .section-stub {
    min-height: 40vh;
    background: #f3ede3;
    margin-top: -2px;
  }

  @keyframes rise-in {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: none; }
  }

  @keyframes focus-in {
    to { opacity: 1; filter: blur(0); transform: none; }
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 1024px) {
    .nav { grid-template-columns: 1fr auto; }
    .nav__menu { display: none; }
    .nav__burger { display: inline-flex; }
    .nav__phone { display: none; }
    .hero__content {
      flex-direction: column;
      align-items: flex-start;
      max-width: 100%;
    }
    .hero__card { flex-basis: auto; width: min(100%, 280px); }
    .hero__title .line--indent { padding-left: 0.28em; }
  }

  @media (max-width: 560px) {
    .nav { padding-top: 20px; }
    .nav__socials { display: none; }
    .hero__card { padding: 28px 24px; }
    .hero__card p { max-width: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
    .hero__bg { transform: none; }
    .hero__card, .hero__title, .nav__logo, .nav__menu, .nav__right { opacity: 1 !important; filter: none !important; transform: none !important; }
  }

  /* Mobile menu overlay */
  .mobile-nav {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(18,24,16,.96);
    backdrop-filter: blur(12px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .35s var(--ease);
  }
  .mobile-nav.is-open { opacity: 1; pointer-events: auto; }
  .mobile-nav a {
    color: #fff;
    text-decoration: none;
    font-size: 18px;
    letter-spacing: 0.06em;
    text-transform: lowercase;
  }
  .mobile-nav__close {
    position: absolute;
    top: 24px;
    right: var(--pad-x);
    width: 40px;
    height: 40px;
    border: 1px solid rgba(255,255,255,.45);
    border-radius: 50%;
    background: transparent;
    color: #fff;
    font-size: 20px;
    cursor: pointer;
  }

  /* Card embed on Mark Studio homepage */
  html.embed-preview,
  html.embed-preview body {
    overflow: hidden !important;
    height: 100%;
    max-height: 100vh;
  }
  html.embed-preview .section-stub { display: none !important; }
  html.embed-preview .hero { min-height: 100svh !important; }
</style>
<script>
  if (new URLSearchParams(location.search).has('embed')) {
    document.documentElement.classList.add('embed-preview');
  }
</script>

<script>
  const menuOpen = document.getElementById('menuOpen');
  const menuClose = document.getElementById('menuClose');
  const mobileNav = document.getElementById('mobileNav');

  function setMenu(open) {
    mobileNav.classList.toggle('is-open', open);
    mobileNav.setAttribute('aria-hidden', open ? 'false' : 'true');
    document.body.style.overflow = open ? 'hidden' : '';
  }

  menuOpen?.addEventListener('click', () => setMenu(true));
  menuClose?.addEventListener('click', () => setMenu(false));
  mobileNav?.querySelectorAll('a').forEach((a) => a.addEventListener('click', () => setMenu(false)));

  // Subtle parallax on scroll (barber-style polish)
  const heroBg = document.querySelector('.hero__bg');
  const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (heroBg && !reduce) {
    addEventListener('scroll', () => {
      const y = Math.min(scrollY, innerHeight);
      heroBg.style.transform = `scale(1) translateY(${y * 0.18}px)`;
    }, { passive: true });
  }
</script>
</body>
</html>
