<!doctype html>
<html lang="sr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rezervacija — Lukić Barber</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="barber-shared.css" />
</head>
<body>
  <header class="topbar">
    <a href="index.html" class="logo">Lukić <span class="accent">Barber</span></a>
    <a href="index.html">← Nazad na sajt</a>
  </header>

  <main class="panel focus-in is-visible">
    <h1>Rezervišite termin</h1>
    <p class="lead">Izaberite uslugu i datum, zatim slobodan termin. Vaši podaci se pojavljuju ispod.</p>

    <form id="bookingForm">
      <div class="book-modal__step1">
        <div class="field">
          <label for="serviceId">Usluga</label>
          <select id="serviceId" name="serviceId" required></select>
        </div>

        <div class="field">
          <label for="date">Datum</label>
          <input id="date" name="date" type="date" required />
        </div>

        <div class="field">
          <label>Termin</label>
          <p class="book-modal__hint" id="slotsHint">Izaberite uslugu i datum.</p>
          <div class="slots" id="slots"></div>
        </div>
      </div>

      <div class="book-modal__step2 focus-in" id="step2" hidden>
        <p class="book-modal__step-label">Vaši podaci</p>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="vas@email.com" required />
        </div>
        <div class="field">
          <label for="name">Ime i prezime</label>
          <input id="name" name="name" placeholder="Vaše ime" required />
        </div>
        <div class="field">
          <label for="phone">Telefon</label>
          <input id="phone" name="phone" type="tel" placeholder="06x xxx xxxx" required />
        </div>
        <button class="btn book-modal__submit" type="submit" id="submitBtn">Potvrdi rezervaciju</button>
      </div>

      <div class="msg" id="formMsg"></div>
    </form>
  </main>

  <script type="module">
    import {
      barberApi,
      getAvailability,
      initFocusReveal,
      minBookableDate,
      revealElement,
    } from './barber-shared.js'

    initFocusReveal()

    const serviceEl = document.getElementById('serviceId')
    const dateEl = document.getElementById('date')
    const slotsEl = document.getElementById('slots')
    const slotsHint = document.getElementById('slotsHint')
    const step2 = document.getElementById('step2')
    const submitBtn = document.getElementById('submitBtn')
    const formMsg = document.getElementById('formMsg')
    const form = document.getElementById('bookingForm')

    dateEl.min = minBookableDate()
    dateEl.value = dateEl.min

    let pickedTime = ''

    function showMsg(text, ok) {
      formMsg.textContent = text
      formMsg.className = `msg ${ok ? 'ok' : 'err'}`
    }

    function maybeRevealStep2() {
      if (serviceEl.value && dateEl.value) {
        revealElement(step2)
      } else {
        step2.hidden = true
        step2.classList.remove('is-visible')
      }
    }

    async function loadSettings() {
      const settings = await barberApi.getSettings()
      if (!settings.acceptBookings) {
        showMsg('Online rezervacije su trenutno isključene. Pozovite salon.', false)
        form.querySelectorAll('input,select,button').forEach((el) => { el.disabled = true })
        return
      }
      serviceEl.innerHTML = settings.services
        .map((s) => `<option value="${s.id}">${s.name} — ${s.priceRsd.toLocaleString('sr-RS')} RSD · ${s.durationMinutes} min</option>`)
        .join('')
      const preselect = new URLSearchParams(location.search).get('service')
      if (preselect && settings.services.some((s) => s.id === preselect)) {
        serviceEl.value = preselect
      }
      renderSlots()
    }

    function renderSlots() {
      pickedTime = ''
      slotsEl.innerHTML = ''

      const date = dateEl.value
      const serviceId = serviceEl.value
      if (!date || !serviceId) {
        slotsHint.textContent = 'Izaberite uslugu i datum.'
        step2.hidden = true
        step2.classList.remove('is-visible')
        return
      }

      maybeRevealStep2()

      const slots = getAvailability(date, serviceId)
      if (!slots.length) {
        slotsHint.textContent = 'Nema dostupnih termina za ovaj dan.'
        return
      }

      slotsHint.textContent = 'Kliknite slobodan termin:'
      slotsEl.innerHTML = slots
        .map((slot) => {
          const cls = slot.available ? 'slot' : 'slot taken'
          return `<button type="button" class="${cls}" data-time="${slot.time}" ${slot.available ? '' : 'disabled'}>${slot.time}</button>`
        })
        .join('')

      slotsEl.querySelectorAll('.slot:not(.taken)').forEach((btn) => {
        btn.addEventListener('click', () => {
          slotsEl.querySelectorAll('.slot').forEach((b) => b.classList.remove('picked'))
          btn.classList.add('picked')
          pickedTime = btn.dataset.time
        })
      })
    }

    serviceEl.addEventListener('change', renderSlots)
    dateEl.addEventListener('change', renderSlots)

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      if (!pickedTime) {
        showMsg('Izaberite termin pre potvrde.', false)
        return
      }
      submitBtn.disabled = true
      try {
        await barberApi.createBooking({
          serviceId: serviceEl.value,
          date: dateEl.value,
          time: pickedTime,
          name: form.name.value.trim(),
          email: form.email.value.trim(),
          phone: form.phone.value.trim(),
        })
        showMsg('✓ Termin je rezervisan. Javićemo vam se porukom da potvrdimo.', true)
        step2.hidden = true
        slotsEl.innerHTML = ''
        slotsHint.textContent = 'Hvala — vidimo se u salonu.'
      } catch (err) {
        showMsg(err.message, false)
        renderSlots()
      } finally {
        submitBtn.disabled = false
      }
    })

    loadSettings().catch((err) => showMsg(err.message, false))
  </script>
</body>
</html>
