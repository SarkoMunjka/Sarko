<!doctype html>
<html lang="sr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rezervacija — Lukić Barber</title>
  <link rel="stylesheet" href="barber-shared.css" />
  <style>
    .book-page { max-width: 580px; margin: 0 auto; padding: 48px 28px 80px; }
    .book-page h1 {
      font-family: var(--font-sans);
      font-size: clamp(1.75rem, 4.5vw, 2.15rem);
      font-weight: 500;
      letter-spacing: -0.02em;
      line-height: 1.08;
      margin-bottom: 8px;
    }
    .book-page .lead { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
  </style>
</head>
<body>
  <header class="topbar">
    <a href="index.html" class="logo">Lukić <span class="accent">Barber</span></a>
    <a href="index.html">← Nazad na sajt</a>
  </header>

  <main class="book-page focus-in is-visible">
    <h1 id="bookPageTitle">Zakaži termin</h1>
    <p class="lead" id="bookPageLead">Izaberite uslugu, datum i vreme.</p>

    <form id="bookingForm">
      <div class="book-flow__steps" data-book-steps>
        <span class="book-flow__step-pill is-active" data-step-pill="1">
          <span class="book-flow__step-num">1</span> Termin
        </span>
        <span class="book-flow__step-divider" aria-hidden="true"></span>
        <span class="book-flow__step-pill" data-step-pill="2">
          <span class="book-flow__step-num">2</span> Podaci
        </span>
      </div>

      <div class="book-flow__step" data-book-step="1">
        <div class="book-picker" data-booking-picker>
          <p class="book-section-label">Usluga</p>
          <div class="book-services" data-services></div>
          <p class="book-service-price" data-service-price hidden></p>

          <p class="book-section-label book-section-label--spaced">Datum</p>
          <div class="book-cal" data-calendar></div>

          <div class="book-time-block" data-time-block hidden>
            <p class="book-section-label book-section-label--spaced">Vreme</p>
            <p class="book-modal__hint" data-slots-hint></p>
            <div class="slots book-slots" data-slots></div>
          </div>
        </div>
      </div>

      <div class="book-flow__step" id="step2" data-book-step="2" hidden>
        <button type="button" class="book-flow__back" data-book-back>← Izmeni termin</button>
        <div class="book-flow__summary" data-book-summary>
          <div class="book-flow__summary-label">Izabrano</div>
          <div class="book-flow__summary-row">
            <span data-summary-service>—</span>
            <span class="book-flow__summary-price" data-summary-price></span>
          </div>
          <div class="book-flow__summary-row">
            <span data-summary-datetime>—</span>
          </div>
        </div>
        <p class="book-section-label">Vaši podaci</p>
        <div class="field">
          <label for="name">Ime i prezime</label>
          <input id="name" name="name" type="text" placeholder="Vaše ime" autocomplete="name" required />
        </div>
        <div class="field">
          <label for="phone">Broj telefona</label>
          <input id="phone" name="phone" type="tel" placeholder="06x xxx xxxx" autocomplete="tel" required />
        </div>
        <div class="field">
          <label for="email">Email <span class="optional">(opciono)</span></label>
          <input id="email" name="email" type="email" placeholder="vas@email.com" autocomplete="email" />
        </div>
        <button class="btn book-modal__submit" type="submit" id="submitBtn">Potvrdi rezervaciju</button>
      </div>

      <div class="msg" id="formMsg"></div>
    </form>
  </main>

  <script type="module">
    import {
      barberApi,
      initFocusReveal,
      wireBookingPicker,
      wireBookingStepFlow,
    } from './barber-shared.js'

    initFocusReveal()

    const form = document.getElementById('bookingForm')
    const step1 = document.querySelector('[data-book-step="1"]')
    const step2 = document.getElementById('step2')
    const submitBtn = document.getElementById('submitBtn')
    const formMsg = document.getElementById('formMsg')
    const pickerRoot = document.querySelector('[data-booking-picker]')

    function showMsg(text, ok) {
      formMsg.textContent = text
      formMsg.className = `msg ${ok ? 'ok' : 'err'}`
    }

    let flow

    const picker = wireBookingPicker(pickerRoot, {
      onChange: (state) => flow.handlePickerChange(state),
    })

    flow = wireBookingStepFlow({
      picker,
      step1,
      step2,
      scrollRoot: null,
      summaryEl: step2.querySelector('[data-book-summary]'),
      titleEl: document.getElementById('bookPageTitle'),
      leadEl: document.getElementById('bookPageLead'),
      nameInput: document.getElementById('name'),
      pillsRoot: document.querySelector('[data-book-steps]'),
    })

    step2.querySelector('[data-book-back]')?.addEventListener('click', () => {
      showMsg('', false)
      flow.goToStep(1)
    })

    const preselect = new URLSearchParams(location.search).get('service')
    picker.load(preselect || '').catch((err) => showMsg(err.message, false))

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      const { serviceId, date, time } = picker.getState()
      if (!serviceId || !date) {
        showMsg('Izaberite uslugu i datum.', false)
        flow.goToStep(1)
        return
      }
      if (!time) {
        showMsg('Izaberite termin pre potvrde.', false)
        flow.goToStep(1)
        return
      }
      const name = form.name.value.trim()
      const phone = form.phone.value.trim()
      if (!name || !phone) {
        showMsg('Unesite ime i broj telefona.', false)
        flow.goToStep(2)
        return
      }
      submitBtn.disabled = true
      try {
        await barberApi.createBooking({
          serviceId,
          date,
          time,
          name,
          email: form.email.value.trim(),
          phone,
        })
        showMsg('✓ Zahtev je poslat. Javićemo vam se kada potvrdimo termin.', true)
        step2.hidden = true
        step1.hidden = true
      } catch (err) {
        showMsg(err.message, false)
        picker.refreshSlots()
      } finally {
        submitBtn.disabled = false
      }
    })
  </script>
</body>
</html>
